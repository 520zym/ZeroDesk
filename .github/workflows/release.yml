name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-latest
            platform: macos
            arch: aarch64
            target: aarch64-apple-darwin
            bundle_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            artifact_suffix: macos-arm64.dmg
          - label: macOS Intel
            os: macos-15-intel
            platform: macos
            arch: x64
            target: x86_64-apple-darwin
            bundle_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            artifact_suffix: macos-x64.dmg
          - label: Windows x64
            os: windows-latest
            platform: windows
            arch: x64
            target: ""
            bundle_glob: src-tauri/target/release/bundle/nsis/*setup.exe
            artifact_suffix: windows-x64-setup.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

          BUILD_DATE="$(date -u +%Y%m%d)"
          ARTIFACT_NAME="ZeroDesk-${VERSION}-${BUILD_DATE}-${{ matrix.artifact_suffix }}"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        if: matrix.target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust target
        if: matrix.target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        shell: bash
        run: |
          CONFIG="{\"version\":\"${VERSION}\"}"
          if [[ -n "${{ matrix.target }}" ]]; then
            pnpm tauri build --target "${{ matrix.target }}" --config "$CONFIG"
          else
            pnpm tauri build --config "$CONFIG"
          fi

      - name: Collect installer
        shell: bash
        run: |
          mkdir -p release
          shopt -s nullglob
          files=( ${{ matrix.bundle_glob }} )

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No installer matched: ${{ matrix.bundle_glob }}" >&2
            exit 1
          fi

          cp "${files[0]}" "release/${ARTIFACT_NAME}"
          ls -lh "release/${ARTIFACT_NAME}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: release/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            TAG_NAME="$VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List installers
        run: ls -lh release

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ZeroDesk ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: release/*
